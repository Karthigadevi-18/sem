name: Deploy to GitHub Packages

on:
  push:
    branches: [ "main" ]

# This is the "magic" part that allows the runner to upload without manual secrets
permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # This automatically names the image after your username and repository
          tags: ghcr.io/${{ github.repository }}:latest

      - name: Show Image Details
        run: |
          echo "Image successfully pushed to GHCR!"
          echo "You can pull it using: docker pull ghcr.io/${{ github.repository }}:latest"
